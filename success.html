<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗРУБ - Анкета прийнята</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '948885934527561');
        fbq('track', 'PageView');
        fbq('track', 'Lead'); // Тригер успішної конверсії
    </script>
    <noscript><img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=948885934527561&ev=PageView&noscript=1"
    /></noscript>
    </head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased flex flex-col justify-center px-6 py-12 md:px-12 min-h-screen selection:bg-zinc-700 selection:text-white">

    <div class="fixed inset-0 z-[-1] bg-cover bg-center opacity-[0.05] grayscale pointer-events-none" style="background-image: url('image.jpg');"></div>

    <div class="max-w-6xl mx-auto w-full opacity-0 transition-opacity duration-1000" id="content-container">
        
        <div class="flex flex-col md:flex-row justify-between items-center md:items-start gap-16 md:gap-24">
            
            <div class="flex-1 text-center md:text-left w-full">
                <h1 id="success-title" class="text-6xl md:text-8xl font-black text-white mb-10 tracking-tighter uppercase"></h1>
                <div id="success-text" class="text-lg md:text-xl text-zinc-300 leading-relaxed space-y-6"></div>
                
                <div class="mt-20 hidden md:block">
                    <a href="/" class="text-zinc-600 hover:text-white uppercase text-xs tracking-widest font-bold transition-colors">&larr; На головну</a>
                </div>
            </div>

            <a id="payment-side" href="#" target="_blank" class="flex flex-col items-center group w-full md:w-auto md:min-w-[320px]">
                <span id="payment-label" class="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 mb-6 group-hover:text-white transition-colors"></span>
                
                <div class="p-6 md:p-8 border border-zinc-800 group-hover:border-zinc-400 transition-all duration-500 bg-zinc-900/50 backdrop-blur-sm group-hover:bg-zinc-900 shadow-2xl relative w-full flex justify-center items-center">
                    
                    <img id="qr-image" src="" alt="QR Оплата" class="w-48 h-48 md:w-64 md:h-64 opacity-80 group-hover:opacity-100 transition-opacity" style="filter: invert(1) brightness(2);">
                    
                </div>
                
                <div class="mt-6 md:hidden">
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest">Клікни, щоб перейти до оплати</span>
                </div>
            </a>

        </div>

        <div class="mt-16 md:hidden text-center">
            <a href="/" class="text-zinc-600 hover:text-white uppercase text-xs tracking-widest font-bold transition-colors">&larr; На головну</a>
        </div>

    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                if (data.success) {
                    // Заповнюємо текст
                    document.getElementById('success-title').innerText = data.success.title;
                    
                    const textContainer = document.getElementById('success-text');
                    data.success.paragraphs.forEach(p => {
                        const pEl = document.createElement('p');
                        pEl.innerText = p;
                        textContainer.appendChild(pEl);
                    });

                    // Налаштовуємо лінк
                    document.getElementById('payment-label').innerText = data.success.paymentText;
                    const pSide = document.getElementById('payment-side');
                    const paymentLink = data.success.paymentLink;
                    pSide.href = paymentLink;

                    // Вставляємо лінк в генератор QR-кодів
                    const qrImg = document.getElementById('qr-image');
                    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(paymentLink)}`;

                    // Показуємо контент
                    document.getElementById('content-container').classList.remove('opacity-0');
                    document.getElementById('content-container').classList.add('opacity-100');
                }
            } catch (error) {
                console.error('Помилка завантаження даних:', error);
            }
        }

        loadData();
    </script>
</body>
</html>
